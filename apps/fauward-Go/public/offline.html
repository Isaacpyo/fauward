<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fauward Go Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fff9f4 0%, #f4efe5 100%);
        color: #161617;
        font-family: Barlow, sans-serif;
      }

      main {
        width: min(100%, 28rem);
        padding: 2rem;
      }

      section {
        border: 1px solid #e6dccd;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.8);
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Offline Mode</h1>
        <p>
          Cached field work remains available. New actions stay queued locally
          until connectivity returns.
        </p>
      </section>
    </main>
  </body>
</html>
