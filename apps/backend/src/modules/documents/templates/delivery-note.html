<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: Arial, sans-serif; color: #0f172a; margin: 24px; }
      .header { border-bottom: 2px solid {{primaryColor}}; margin-bottom: 16px; padding-bottom: 8px; }
      .title { font-size: 20px; font-weight: 700; }
      .meta { font-size: 13px; color: #334155; margin-top: 6px; }
    </style>
  </head>
  <body>
    <section class="header">
      <div class="title">{{brandName}} Delivery Note</div>
      <div class="meta">Tracking: {{trackingNumber}} | Tier: {{serviceTier}} | Generated: {{generatedAt}}</div>
    </section>
    <p><strong>Customer:</strong> {{customerName}}</p>
    <p><strong>Origin:</strong> {{originAddress}}</p>
    <p><strong>Destination:</strong> {{destinationAddress}}</p>
  </body>
</html>
